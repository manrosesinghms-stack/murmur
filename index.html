<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MURMUR — guide the living swarm</title>
<meta name="description" content="Guide a living swarm of light. Move, and thousands of glowing motes flow after you like a murmuration.">
<meta name="theme-color" content="#05070f">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05070f;cursor:none;touch-action:none}
  #c{display:block}
  #ui{position:fixed;inset:0;pointer-events:none;font-family:'Segoe UI',Arial,sans-serif;color:#dbeafe}
  #title{position:absolute;left:0;right:0;top:38%;text-align:center;transition:opacity 1.2s}
  #title h1{margin:0;font-size:15vmin;font-weight:200;letter-spacing:1.2vmin;
    background:linear-gradient(90deg,#67e8f9,#a5b4fc,#f0abfc,#fde68a);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 24px rgba(103,232,249,.35))}
  #title p{margin:1vmin 0 0;font-size:2.6vmin;font-weight:300;letter-spacing:.5vmin;color:#93a3c0}
  #hint{position:absolute;left:0;right:0;bottom:6%;text-align:center;font-size:2.2vmin;color:#5b6b8c;font-weight:300;letter-spacing:.4vmin;opacity:.9}
  #stat{position:absolute;top:10px;left:12px;font-size:12px;color:#31405f;font-variant-numeric:tabular-nums}
  .fade{opacity:0!important}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title"><h1>MURMUR</h1><p>move to guide the swarm</p></div>
  <div id="hint">move your cursor &nbsp;·&nbsp; hold to gather</div>
  <div id="stat"></div>
</div>
<script>
'use strict';
/* ================= MURMUR — Phase 1: the living swarm =================
   Flocking (boids) + cursor attraction, additive glow, fading light-trails.
   Goal of this phase: prove it is mesmerising AND holds 60fps.
====================================================================== */

const cv=document.getElementById('c'), ctx=cv.getContext('2d',{alpha:false});
let DPR=Math.min(devicePixelRatio||1, 1.5);
let VW=0,VH=0;
function resize(){
  VW=innerWidth; VH=innerHeight;
  cv.width=VW*DPR; cv.height=VH*DPR;
  cv.style.width=VW+'px'; cv.style.height=VH+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle='#05070f'; ctx.fillRect(0,0,VW,VH);
}
addEventListener('resize',resize); resize();

/* ---------- pre-rendered tinted glow sprites ---------- */
const PALETTE=['#67e8f9','#38bdf8','#818cf8','#a78bfa','#e879f9','#f0abfc','#fde68a','#5eead4'];
const SPRITE=64;
const glowSprites=PALETTE.map(col=>{
  const s=document.createElement('canvas'); s.width=SPRITE; s.height=SPRITE;
  const g=s.getContext('2d');
  const grd=g.createRadialGradient(SPRITE/2,SPRITE/2,0,SPRITE/2,SPRITE/2,SPRITE/2);
  grd.addColorStop(0,'rgba(255,255,255,0.95)');
  grd.addColorStop(0.22, col);
  grd.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grd; g.beginPath(); g.arc(SPRITE/2,SPRITE/2,SPRITE/2,0,7); g.fill();
  return s;
});

/* ---------- swarm data ---------- */
let N=0;
let px,py,vx,vy,hue;
function targetN(){
  const area=VW*VH;
  const n=Math.round(area/1400);      // ~ one agent per 1400 css px^2
  return Math.max(300, Math.min(1400, n));
}
function initSwarm(){
  N=targetN();
  px=new Float32Array(N); py=new Float32Array(N);
  vx=new Float32Array(N); vy=new Float32Array(N);
  hue=new Uint8Array(N);
  for(let i=0;i<N;i++){
    const a=Math.random()*Math.PI*2, r=Math.random()*Math.min(VW,VH)*0.3;
    px[i]=VW/2+Math.cos(a)*r; py[i]=VH/2+Math.sin(a)*r;
    vx[i]=Math.cos(a)*0.6; vy[i]=Math.sin(a)*0.6;
    hue[i]=(Math.random()*PALETTE.length)|0;
  }
}
initSwarm();

/* ---------- spatial grid ---------- */
const NEI=30;                      // neighbour radius
const CELL=NEI;
let cols,rows,cellHead,cellNext;
function buildGrid(){
  cols=Math.max(1,Math.ceil(VW/CELL)); rows=Math.max(1,Math.ceil(VH/CELL));
  cellHead=new Int32Array(cols*rows).fill(-1);
  cellNext=new Int32Array(N);
  for(let i=0;i<N;i++){
    let cx=(px[i]/CELL)|0, cy=(py[i]/CELL)|0;
    cx=cx<0?0:cx>=cols?cols-1:cx; cy=cy<0?0:cy>=rows?rows-1:cy;
    const c=cy*cols+cx;
    cellNext[i]=cellHead[c]; cellHead[c]=i;
  }
}

/* ---------- pointer ---------- */
const P={x:VW/2,y:VH/2,active:false,down:false};
function setP(e){const t=e.touches?e.touches[0]:e; if(!t)return; P.x=t.clientX; P.y=t.clientY; P.active=true; hideTitle();}
cv.addEventListener('mousemove',setP);
cv.addEventListener('mousedown',e=>{P.down=true;setP(e);});
addEventListener('mouseup',()=>P.down=false);
cv.addEventListener('touchstart',e=>{P.down=true;setP(e);e.preventDefault();},{passive:false});
cv.addEventListener('touchmove',e=>{setP(e);e.preventDefault();},{passive:false});
addEventListener('touchend',()=>P.down=false);

let titleHidden=false;
function hideTitle(){if(titleHidden)return;titleHidden=true;document.getElementById('title').classList.add('fade');document.getElementById('hint').classList.add('fade');}

/* ---------- flocking params ---------- */
const MAXSPD=3.4, MINSPD=1.2, MAXF=0.16;
const SEP=13, SEPW=1.7, ALIW=1.0, COHW=0.9;
const WANDER=0.05;
let t=0;

function step(){
  t+=1;
  buildGrid();
  const sep2=SEP*SEP, nei2=NEI*NEI;
  const pull = P.down?0.05:0.018;       // hold = gather harder
  for(let i=0;i<N;i++){
    const x=px[i],y=py[i],ix=vx[i],iy=vy[i];
    let sx=0,sy=0, ax=0,ay=0, cxs=0,cys=0, cnt=0, scnt=0;
    let cx=(x/CELL)|0, cy=(y/CELL)|0;
    cx=cx<0?0:cx>=cols?cols-1:cx; cy=cy<0?0:cy>=rows?rows-1:cy;
    let checked=0;
    for(let gy=cy-1;gy<=cy+1;gy++){
      if(gy<0||gy>=rows)continue;
      for(let gx=cx-1;gx<=cx+1;gx++){
        if(gx<0||gx>=cols)continue;
        let j=cellHead[gy*cols+gx];
        while(j!==-1){
          if(j!==i && checked<24){
            const dx=px[j]-x, dy=py[j]-y, d2=dx*dx+dy*dy;
            if(d2<nei2){
              checked++;
              ax+=vx[j]; ay+=vy[j];
              cxs+=px[j]; cys+=py[j]; cnt++;
              if(d2<sep2 && d2>0.0001){ const inv=1/Math.sqrt(d2); sx-=dx*inv; sy-=dy*inv; scnt++; }
            }
          }
          j=cellNext[j];
        }
      }
    }
    let fx=0,fy=0;
    if(scnt>0){ fx+=(sx/scnt)*SEPW; fy+=(sy/scnt)*SEPW; }
    if(cnt>0){
      // alignment
      let alx=ax/cnt-ix, aly=ay/cnt-iy; fx+=alx*ALIW*0.12; fy+=aly*ALIW*0.12;
      // cohesion
      let clx=cxs/cnt-x, cly=cys/cnt-y; const cl=Math.hypot(clx,cly)||1; fx+=(clx/cl)*COHW*0.4; fy+=(cly/cl)*COHW*0.4;
    }
    // cursor attraction
    const dxp=P.x-x, dyp=P.y-y, dp=Math.hypot(dxp,dyp)||1;
    const aw=pull*Math.min(1,dp/260);
    fx+=(dxp/dp)*aw*8; fy+=(dyp/dp)*aw*8;
    // gentle swirl around pointer (murmuration curl)
    fx+=(-dyp/dp)*aw*3; fy+=(dxp/dp)*aw*3;
    // wander
    fx+=Math.cos(t*0.01+i)*WANDER; fy+=Math.sin(t*0.013+i*1.3)*WANDER;
    // soft edges
    if(x<40)fx+=(40-x)*0.02; else if(x>VW-40)fx-=(x-(VW-40))*0.02;
    if(y<40)fy+=(40-y)*0.02; else if(y>VH-40)fy-=(y-(VH-40))*0.02;
    // clamp force
    const fl=Math.hypot(fx,fy); if(fl>MAXF){fx=fx/fl*MAXF; fy=fy/fl*MAXF;}
    let nvx=ix+fx, nvy=iy+fy;
    let sp=Math.hypot(nvx,nvy);
    if(sp>MAXSPD){nvx=nvx/sp*MAXSPD; nvy=nvy/sp*MAXSPD;}
    else if(sp<MINSPD && sp>0.001){nvx=nvx/sp*MINSPD; nvy=nvy/sp*MINSPD;}
    vx[i]=nvx; vy[i]=nvy;
    px[i]=x+nvx; py[i]=y+nvy;
  }
}

/* ---------- render ---------- */
function render(){
  // fade previous frame → light trails
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='rgba(5,7,15,0.14)';
  ctx.fillRect(0,0,VW,VH);
  // draw glowing agents additively
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<N;i++){
    const sp=Math.hypot(vx[i],vy[i]);
    const h=(hue[i]+((sp*1.5)|0))%PALETTE.length;
    const size=6+sp*2.2;
    const s=glowSprites[h];
    ctx.globalAlpha=0.55;
    ctx.drawImage(s, px[i]-size/2, py[i]-size/2, size, size);
  }
  ctx.globalAlpha=1;
  // pointer glow
  if(P.active){
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=P.down?0.5:0.22;
    const ps=P.down?90:60;
    ctx.drawImage(glowSprites[6], P.x-ps/2, P.y-ps/2, ps, ps);
    ctx.globalAlpha=1;
  }
}

/* ---------- loop + fps ---------- */
let last=performance.now(), fps=60, acc=0, frames=0, fpsT=0;
function frame(now){
  requestAnimationFrame(frame);
  const dt=now-last; last=now;
  step();
  render();
  frames++; fpsT+=dt;
  if(fpsT>=500){ fps=Math.round(frames/(fpsT/1000)); frames=0; fpsT=0;
    document.getElementById('stat').textContent=N+' motes · '+fps+' fps';
    // auto-tune: if struggling, trim the swarm
    if(fps<48 && N>350){ trim(120); }
  }
}
function trim(k){
  const nn=Math.max(300,N-k);
  px=px.slice(0,nn); py=py.slice(0,nn); vx=vx.slice(0,nn); vy=vy.slice(0,nn); hue=hue.slice(0,nn); N=nn;
}
requestAnimationFrame(frame);

/* ---------- debug ---------- */
window.__mur={
  info:()=>({n:N,fps,pointer:{x:Math.round(P.x),y:Math.round(P.y),down:P.down},vw:VW,vh:VH}),
  move:(x,y,down)=>{P.x=x;P.y=y;P.active=true;P.down=!!down;hideTitle();return window.__mur.info();},
  setN:(n)=>{N=Math.max(50,Math.min(2000,n|0));initSwarm();return N;},
};
</script>
</body>
</html>
