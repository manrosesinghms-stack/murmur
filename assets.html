<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Murmur — store art</title>
<style>body{background:#04050d;color:#cbd5e1;font-family:Arial;padding:18px}canvas{display:block;margin:12px 0;max-width:680px;border:1px solid #1e293b}a{color:#67e8f9;font-weight:bold}</style>
</head><body><h1>Murmur store art</h1><div id="out"></div>
<script>
'use strict';
const rnd=(a,b)=>a+Math.random()*(b-a);
const SP=64;
function radial(stops){const s=document.createElement('canvas');s.width=SP;s.height=SP;const g=s.getContext('2d');const gr=g.createRadialGradient(SP/2,SP/2,0,SP/2,SP/2,SP/2);for(const[o,c]of stops)gr.addColorStop(o,c);g.fillStyle=gr;g.beginPath();g.arc(SP/2,SP/2,SP/2,0,7);g.fill();return s;}
const PAL=['#7dd3fc','#38bdf8','#818cf8','#a78bfa','#e879f9','#f0abfc','#fde68a','#5eead4'];
const glow=PAL.map(c=>radial([[0,'rgba(255,255,255,0.95)'],[0.22,c],[1,'rgba(0,0,0,0)']]));
const lightCore=radial([[0,'rgba(255,255,255,1)'],[0.25,'#fff4c2'],[0.6,'rgba(253,230,138,0.5)'],[1,'rgba(0,0,0,0)']]);
const voidCore=radial([[0,'rgba(4,3,10,1)'],[0.55,'rgba(6,4,14,0.95)'],[0.75,'rgba(20,4,20,0.5)'],[1,'rgba(0,0,0,0)']]);
const voidRing=radial([[0,'rgba(0,0,0,0)'],[0.62,'rgba(0,0,0,0)'],[0.74,'rgba(244,63,94,0.75)'],[0.83,'rgba(217,70,239,0.5)'],[1,'rgba(0,0,0,0)']]);

function draw(cv,mode){
  const W=cv.width,H=cv.height,x=cv.getContext('2d');
  // nebula
  x.fillStyle='#04050d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  for(const[col,fx,fy,rr] of [['#1b2a5e',0.5,0.35,0.55],['#123a44',0.72,0.62,0.5],['#2a1a4d',0.3,0.7,0.55],['#0e2540',0.85,0.3,0.45]]){
    const cx=W*fx,cy=H*fy,r=Math.max(W,H)*rr,g=x.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');x.globalAlpha=0.55;x.fillStyle=g;x.fillRect(0,0,W,H);
  }
  x.globalAlpha=1;
  // stars
  for(let i=0;i<W*H/7000;i++){x.globalAlpha=rnd(0.15,0.6);const s=rnd(1,3);x.drawImage(glow[0],rnd(0,W)-s,rnd(0,H)-s,s*2,s*2);}
  x.globalAlpha=1;
  // swarm: a big spiral murmuration
  const scx=mode==='sq'?W*0.5:W*0.42, scy=mode==='po'?H*0.42:H*0.52, R=Math.min(W,H)*(mode==='po'?0.34:0.32);
  const arms=3, per=520;
  for(let i=0;i<per*arms;i++){
    const arm=i%arms, tt=(i/(per*arms));
    const ang=tt*Math.PI*6 + arm*(Math.PI*2/arms) + Math.sin(tt*10)*0.3;
    const rad=R*(0.12+tt*0.9);
    const jx=rnd(-10,10), jy=rnd(-10,10);
    const px=scx+Math.cos(ang)*rad+jx, py=scy+Math.sin(ang)*rad*0.8+jy;
    const h=(i*7)%PAL.length, sz=rnd(6,16)*(1-tt*0.4);
    x.globalAlpha=0.5;x.drawImage(glow[h],px-sz/2,py-sz/2,sz,sz);
  }
  x.globalAlpha=1;
  // bright core
  const cs=R*0.5;x.drawImage(glow[0],scx-cs/2,scy-cs/2,cs,cs);x.globalAlpha=0.8;x.drawImage(glow[6],scx-cs*0.3,scy-cs*0.3,cs*0.6,cs*0.6);x.globalAlpha=1;
  // a radiant light
  const ls=Math.min(W,H)*0.13;x.drawImage(lightCore,scx+R*1.1-ls/2,scy-R*0.5-ls/2,ls,ls);
  // a void predator with pink corona
  const vx=scx+R*(mode==='po'?0.2:0.75), vy=scy+R*(mode==='po'?1.0:0.15), vs=Math.min(W,H)*0.13;
  x.globalCompositeOperation='source-over';x.drawImage(voidCore,vx-vs/2,vy-vs/2,vs,vs);
  x.globalCompositeOperation='lighter';x.drawImage(voidRing,vx-vs*0.6,vy-vs*0.6,vs*1.2,vs*1.2);
  x.globalCompositeOperation='source-over';
  // vignette
  const vg=x.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.72);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(2,3,9,0.8)');x.fillStyle=vg;x.fillRect(0,0,W,H);
  // logo
  const ly=mode==='po'?H*0.8:mode==='sq'?H*0.8:H*0.82, fs=mode==='sq'?W*0.16:mode==='po'?W*0.19:W*0.1;
  x.textAlign='center';
  const grd=x.createLinearGradient(W/2-fs*2,0,W/2+fs*2,0);grd.addColorStop(0,'#67e8f9');grd.addColorStop(0.4,'#a5b4fc');grd.addColorStop(0.7,'#f0abfc');grd.addColorStop(1,'#fde68a');
  x.font='100 '+fs+'px Arial';x.shadowColor='rgba(129,140,248,0.6)';x.shadowBlur=fs*0.5;x.fillStyle=grd;
  x.fillText('MURMUR',W/2,ly);x.shadowBlur=0;
  if(mode!=='sq'){x.font='300 '+(fs*0.22)+'px Arial';x.fillStyle='#9fb2d6';x.fillText('GUIDE  THE  LIVING  SWARM',W/2,ly+fs*0.34);}
}
const specs=[['cover_2048x1152',2048,1152,'wide'],['cover_1920x1080',1920,1080,'wide'],['portrait_800x1200',800,1200,'po'],['icon_800x800',800,800,'sq'],['icon_512',512,512,'sq']];
const out=document.getElementById('out');
window.__covers={};
for(const[name,w,h,mode] of specs){
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;draw(cv,mode);
  const a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download='murmur_'+name+'.png';a.textContent='⬇ '+name;
  out.appendChild(a);out.appendChild(document.createElement('br'));out.appendChild(cv);
  window.__covers[name]=cv;
}
</script></body></html>
